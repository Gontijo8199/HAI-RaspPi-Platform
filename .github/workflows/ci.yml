name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar Ruff
        run: pip install ruff

      - name: Verificar lint
        run: ruff check .

      - name: Verificar formatação
        run: ruff format --check .

  test:
    name: Testes (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev espeak-ng libespeak-ng-dev

      - name: Instalar torch CPU
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Criar configurações de teste
        run: |
          mkdir -p config

          cat > config/secrets.toml << 'TOML'
          [api]
          key = "test-key"
          TOML

          cat > config/settings.toml << 'TOML'
          [api]
          model = "gemma-4-26b-a4b-it"

          [stt]
          language = "pt"
          whisper_model = "tiny"
          whisper_device = "cpu"
          whisper_compute_type = "int8"

          [vad]
          threshold = 0.5
          preroll_ms = 500
          silence_ms = 700
          interim_interval_ms = 1500

          [tts]
          backend = "espeak"
          piper_bin = "/opt/piper/piper/piper"
          piper_model = "/opt/piper/voices/pt_BR-faber-medium.onnx"
          rate = 160
          lang = "pt-br"
          TOML

      - name: Verificar sintaxe
        run: python -m compileall .

      - name: Executar testes
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

  docker:
    name: Build Docker (multi-arch)
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
